<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHIIFT - Reset Password</title>
    <link rel="stylesheet" href="/static/bootstrap/css/bootstrap.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        html, body {
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: #F7FBF8;
            color: #10302E;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Baloo 2', 'Poppins', sans-serif;
            font-weight: 700;
        }

        .brand-link {
            font-family: 'Baloo 2', sans-serif;
            font-weight: 800;
            font-size: 1.8rem;
            letter-spacing: 1px;
            color: #0A4144;
            text-decoration: none;
        }

        .brand-link:hover {
            color: #0F6E68;
        }

        .brand-sub {
            font-family: 'Poppins', sans-serif;
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #56716D;
        }

        .shiift-card {
            background-color: #FFFFFF;
            border: 1px solid #E1F0E4;
            border-radius: 14px;
            box-shadow: 0 4px 18px rgba(10, 65, 68, 0.07);
        }

        .form-label {
            font-family: 'Poppins', sans-serif;
            font-size: 0.82rem;
            font-weight: 600;
            color: #10302E;
        }

        .form-control {
            border: 1px solid #E1F0E4;
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
            color: #10302E;
            padding: 0.6rem 0.9rem;
        }

        .form-control:focus {
            border-color: #6FD490;
            box-shadow: 0 0 0 0.2rem rgba(111, 212, 144, 0.2);
        }

        .form-control.is-invalid {
            border-color: #dc3545;
            box-shadow: none;
        }

        .form-text {
            font-family: 'Poppins', sans-serif;
            font-size: 0.78rem;
            color: #56716D;
        }

        .invalid-feedback {
            font-family: 'Poppins', sans-serif;
            font-size: 0.78rem;
        }

        /* Password input wrapper */
        .password-wrapper {
            position: relative;
        }

        .password-wrapper .form-control {
            padding-right: 2.8rem;
        }

        .toggle-pw {
            position: absolute;
            right: 0.9rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
            color: #56716D;
            font-size: 0.8rem;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
        }

        .toggle-pw:hover {
            color: #0A4144;
        }

        /* Strength meter */
        .strength-bar-wrap {
            height: 4px;
            background-color: #E1F0E4;
            border-radius: 100px;
            margin-top: 0.5rem;
            overflow: hidden;
        }

        .strength-bar {
            height: 100%;
            width: 0%;
            border-radius: 100px;
            transition: width 0.3s ease, background-color 0.3s ease;
        }

        .strength-label {
            font-family: 'Poppins', sans-serif;
            font-size: 0.72rem;
            font-weight: 600;
            margin-top: 0.3rem;
            color: #56716D;
        }

        .btn-shiift-primary {
            background-color: #0A4144;
            border: none;
            color: #F7FBF8;
            border-radius: 10px;
            font-family: 'Baloo 2', sans-serif;
            font-weight: 700;
            font-size: 0.95rem;
            padding: 0.6rem 1rem;
            width: 100%;
            transition: background-color 0.15s ease;
        }

        .btn-shiift-primary:hover {
            background-color: #0F6E68;
            color: #F7FBF8;
        }

        .btn-shiift-primary:disabled {
            background-color: #A7C8C4;
            cursor: not-allowed;
        }

        .back-link {
            font-family: 'Poppins', sans-serif;
            font-size: 0.82rem;
            font-weight: 600;
            color: #0F6E68;
            text-decoration: none;
        }

        .back-link:hover {
            color: #0A4144;
            text-decoration: underline;
        }

        /* Success state */
        .success-notice {
            background-color: #D7F2DD;
            border: 1px solid #A7E3AF;
            border-radius: 10px;
            color: #0A4144;
            font-family: 'Poppins', sans-serif;
            font-size: 0.88rem;
            padding: 1rem 1.25rem;
            display: none;
        }

        .success-notice strong {
            font-weight: 700;
        }

        /* Expired token state */
        .error-notice {
            background-color: #FDE8E8;
            border: 1px solid #F5C6CB;
            border-radius: 10px;
            color: #7B2020;
            font-family: 'Poppins', sans-serif;
            font-size: 0.88rem;
            padding: 1rem 1.25rem;
            display: none;
        }
    </style>
</head>
<body class="my-5">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">

                <!-- Brand -->
                <div class="text-center mb-4">
                    <a href="/index.html" class="brand-link">SHIIFT</a>
                    <p class="brand-sub mt-1 mb-0">Set New Password</p>
                </div>

                <!-- Card -->
                <div class="shiift-card">
                    <div class="p-4">

                        <h5 class="fw-bold mb-1" style="color: #0A4144;">Choose a new password</h5>
                        <p class="form-text mb-4">Make it strong. You won't be asked again until you forget it.</p>

                        <!-- Expired token notice -->
                        <div class="error-notice mb-3" id="errorNotice">
                            <strong>This link has expired.</strong> Reset links are only valid for 30 minutes. <a href="/forgot-password.html" style="color: #7B2020; font-weight: 600;">Request a new one.</a>
                        </div>

                        <!-- Success notice -->
                        <div class="success-notice mb-3" id="successNotice">
                            <strong>Password updated.</strong> You can now log in with your new password.
                        </div>

                        <!-- Form -->
                        <form id="resetPasswordForm" novalidate>

                            <div class="mb-3">
                                <label class="form-label" for="newPassword">New Password</label>
                                <div class="password-wrapper">
                                    <input 
                                        type="password" 
                                        class="form-control" 
                                        id="newPassword"
                                        placeholder="••••••••"
                                        required
                                        autocomplete="new-password"
                                    >
                                    <button type="button" class="toggle-pw" id="toggleNew">Show</button>
                                </div>
                                <!-- Strength meter -->
                                <div class="strength-bar-wrap mt-2">
                                    <div class="strength-bar" id="strengthBar"></div>
                                </div>
                                <p class="strength-label" id="strengthLabel"></p>
                                <div class="invalid-feedback" id="newPasswordError"></div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label" for="confirmPassword">Confirm New Password</label>
                                <div class="password-wrapper">
                                    <input 
                                        type="password" 
                                        class="form-control" 
                                        id="confirmPassword"
                                        placeholder="••••••••"
                                        required
                                        autocomplete="new-password"
                                    >
                                    <button type="button" class="toggle-pw" id="toggleConfirm">Show</button>
                                </div>
                                <div class="invalid-feedback" id="confirmPasswordError"></div>
                            </div>

                            <button type="submit" class="btn-shiift-primary" id="submitBtn">
                                Update Password
                            </button>

                        </form>

                    </div>

                    <!-- Footer -->
                    <div class="border-top px-4 py-3 text-center" style="border-color: #E1F0E4 !important;">
                        <a href="/index.html" class="back-link">&#8592; Back to Login</a>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="/static/js/jquery-4.0.0.min.js"></script>
    <script src="/static/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script>
        $(document).ready(function () {

            // Toggle password visibility
            $('#toggleNew').on('click', function () {
                var input = $('#newPassword');
                var isHidden = input.attr('type') === 'password';
                input.attr('type', isHidden ? 'text' : 'password');
                $(this).text(isHidden ? 'Hide' : 'Show');
            });

            $('#toggleConfirm').on('click', function () {
                var input = $('#confirmPassword');
                var isHidden = input.attr('type') === 'password';
                input.attr('type', isHidden ? 'text' : 'password');
                $(this).text(isHidden ? 'Hide' : 'Show');
            });

            // Password strength meter
            $('#newPassword').on('input', function () {
                var val = $(this).val();
                var strength = 0;

                if (val.length >= 8) strength++;
                if (/[A-Z]/.test(val)) strength++;
                if (/[0-9]/.test(val)) strength++;
                if (/[^A-Za-z0-9]/.test(val)) strength++;

                var bar = $('#strengthBar');
                var label = $('#strengthLabel');

                var levels = {
                    0: { width: '0%',   color: '#E1F0E4', text: '' },
                    1: { width: '25%',  color: '#dc3545', text: 'Weak' },
                    2: { width: '50%',  color: '#fd7e14', text: 'Fair' },
                    3: { width: '75%',  color: '#6FD490', text: 'Good' },
                    4: { width: '100%', color: '#0A4144', text: 'Strong' }
                };

                bar.css({ width: levels[strength].width, 'background-color': levels[strength].color });
                label.text(levels[strength].text).css('color', levels[strength].color);
            });

            // Form submission
            $('#resetPasswordForm').on('submit', function (e) {
                e.preventDefault();

                var newPw = $('#newPassword').val();
                var confirmPw = $('#confirmPassword').val();
                var valid = true;

                // Reset states
                $('#newPassword, #confirmPassword').removeClass('is-invalid');
                $('#newPasswordError, #confirmPasswordError').text('');

                if (newPw.length < 8) {
                    $('#newPassword').addClass('is-invalid');
                    $('#newPasswordError').text('Password must be at least 8 characters.').show();
                    valid = false;
                }

                if (newPw !== confirmPw) {
                    $('#confirmPassword').addClass('is-invalid');
                    $('#confirmPasswordError').text('Passwords do not match.').show();
                    valid = false;
                }

                if (!valid) return;

                var btn = $('#submitBtn');
                btn.text('Updating...').prop('disabled', true);

                // Simulate API call — replace with Flask fetch later
                setTimeout(function () {
                    $('#resetPasswordForm').slideUp(200);
                    $('#successNotice').slideDown(200);

                    // Redirect to login after 2.5 seconds
                    setTimeout(function () {
                        window.location.href = '/index.html';
                    }, 2500);
                }, 1000);
            });

        });
    </script>
</body>
</html>
